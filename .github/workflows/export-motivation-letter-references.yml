name: Export Motivation Letter References

on:
  pull_request:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: motivation-letter-references
          path: |
            modules/motivation-letter/references/ad_logo.png
            modules/motivation-letter/references/logo-alignment-reference.png
            modules/motivation-letter/references/Motivationsschreiben_Vorlage.idml
            modules/motivation-letter/references/Motivationsschreiben_Vorlage.pdf
