name: Render CV

on:
  pull_request:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run validate
      - run: npm run render:all
      - run: npm run test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cv-render-artifacts
          path: |
            dist/*.pdf
            dist/*.png
            dist/render-report-*.json
            dist/*-preview.html
