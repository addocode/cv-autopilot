<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>{{job.title}} – RAV-Recap</title>
  <style>
    :root{--blue:#15519f;--bg:#f3f5f8;--card:#fff;--text:#172033;--muted:#677084;--ok:#18794e;--border:#d9deea}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:16px/1.45 Arial,sans-serif}
    main{width:min(760px,100%);margin:auto;padding:16px 12px 40px} header{background:var(--blue);color:#fff;padding:22px 18px;border-radius:18px;margin-bottom:14px}
    h1{font-size:1.5rem;margin:0 0 5px} h2{font-size:1.05rem;margin:0 0 12px} p{margin:.35rem 0}.meta{opacity:.9}
    .actions{display:grid;grid-template-columns:1fr;gap:10px;margin:14px 0}.btn{appearance:none;border:0;border-radius:12px;padding:14px 16px;font-weight:700;font-size:1rem;cursor:pointer;background:var(--blue);color:#fff;min-height:48px}.btn.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}
    section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 4px 16px rgba(20,38,70,.05)}
    .field{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border-top:1px solid var(--border);padding:12px 0}.field:first-of-type{border-top:0}.label{font-size:.82rem;color:var(--muted);margin-bottom:3px}.value{font-weight:700;overflow-wrap:anywhere}.copy{border:1px solid var(--blue);background:#fff;color:var(--blue);border-radius:10px;padding:10px 12px;font-weight:700;min-width:84px;min-height:44px}.choice{display:inline-flex;align-items:center;gap:8px;font-weight:700}.choice::before{content:'✓';display:grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--ok);color:#fff}
    details{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-top:12px}summary{font-weight:700;cursor:pointer}.note{font-size:.9rem;color:var(--muted)}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:999px;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}
    @media(min-width:620px){main{padding-top:24px}.actions{grid-template-columns:1fr 1fr}.field{grid-template-columns:minmax(0,1fr) 110px}}
    @media print{body{background:#fff}.btn,.copy,.toast{display:none}main{width:100%;padding:0}section,header,details{break-inside:avoid;box-shadow:none}}
  </style>
</head>
<body>
<main>
  <header>
    <h1>RAV-Recap</h1>
    <p><strong>{{job.title}}</strong></p>
    <p class="meta">{{company.name}} · Bewerbung vom {{applicationDate}}</p>
  </header>
  <div class="actions">
    <button class="btn" type="button" onclick="copyAll()">Alle Werte kopieren</button>
    <button class="btn secondary" type="button" onclick="window.print()">Drucken / als PDF sichern</button>
  </div>
  <section>
    <h2>1 · Bewerbung</h2>
    {{fields.application}}
  </section>
  <section>
    <h2>2 · Arbeitgeber</h2>
    {{fields.company}}
  </section>
  <section>
    <h2>3 · Stelle und Status</h2>
    {{fields.job}}
  </section>
  <details>
    <summary>Anweisungen und Annahmen</summary>
    {{instructionsAndSources}}
  </details>
</main>
<div id="toast" class="toast" role="status">Kopiert</div>
<script>
  const values={{jsonValues}};
  async function copyText(value,label){await navigator.clipboard.writeText(value);showToast(label+' kopiert')}
  async function copyAll(){const text=Object.entries(values).map(([k,v])=>k+': '+v).join('\n');await navigator.clipboard.writeText(text);showToast('Alle Werte kopiert')}
  function showToast(text){const t=document.getElementById('toast');t.textContent=text;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}
</script>
</body>
</html>
