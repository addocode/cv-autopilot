name: Render CV

on:
  pull_request:
  push:
    branches:
      - codex/arbeite-am-modularen-cv-framework
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run validate
      - run: npm run render:all
      - run: npm run test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cv-render-artifacts
          path: |
            dist/*.pdf
            dist/*.png
            dist/*-preview.html
            dist/render-report-*.json
