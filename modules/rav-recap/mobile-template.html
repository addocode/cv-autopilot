<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#15519f">
<title>{{job.title}} – RAV-Recap</title>
<style>
:root{--blue:#15519f;--bg:#f2f5f9;--card:#fff;--text:#172033;--muted:#657083;--border:#d8deea;--ok:#15803d;--warn:#a16207}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--text);font:16px/1.45 Arial,sans-serif}
main{width:min(760px,100%);margin:auto;padding:14px 12px 42px}
header{background:linear-gradient(145deg,#15519f,#0e3f82);color:#fff;padding:22px 18px;border-radius:18px;box-shadow:0 8px 28px rgba(21,81,159,.18)}
h1{font-size:1.55rem;line-height:1.15;margin:0 0 8px}
h2{font-size:1.05rem;margin:0 0 8px}
p{margin:.28rem 0}.sub{opacity:.9}
.actions{display:grid;grid-template-columns:1fr;gap:10px;margin:14px 0}
button{font:inherit}.btn{border:0;border-radius:13px;padding:14px 16px;font-weight:700;font-size:1rem;min-height:50px;cursor:pointer}
.btn.primary{background:var(--blue);color:#fff}.btn.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}
section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 4px 16px rgba(20,38,70,.05)}
.field{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;border-top:1px solid var(--border);padding:12px 0}
.field:first-of-type{border-top:0}.label{font-size:.82rem;color:var(--muted);margin-bottom:3px}.value{font-weight:700;overflow-wrap:anywhere;word-break:break-word}
.choice{display:inline-flex;align-items:center;gap:8px}.choice:before{content:'✓';display:grid;place-items:center;width:24px;height:24px;flex:0 0 24px;border-radius:50%;background:var(--ok);color:#fff;font-size:.9rem}
.copy{border:1px solid var(--blue);background:#fff;color:var(--blue);border-radius:10px;padding:10px 11px;font-weight:700;min-height:44px;min-width:88px;cursor:pointer}
.copy.done{background:var(--ok);border-color:var(--ok);color:#fff}.badge{display:inline-block;background:#fff7ed;color:var(--warn);border:1px solid #fed7aa;border-radius:999px;padding:1px 7px;font-size:.72rem;font-weight:700;vertical-align:middle}
details{background:#fff;border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-top:12px}summary{font-weight:700;cursor:pointer}.note{font-size:.9rem;color:var(--muted)}
.fallback{background:#fff7ed;border-left:4px solid #f59e0b;padding:10px 12px;border-radius:8px;margin-top:10px;overflow-wrap:anywhere}
.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:999px;opacity:0;pointer-events:none;transition:.18s;z-index:100}.toast.show{opacity:1}
@media(min-width:620px){main{padding-top:24px}.actions{grid-template-columns:1fr 1fr}}
@media(max-width:390px){.field{grid-template-columns:1fr}.copy{width:100%}}
@media print{body{background:#fff}main{width:100%;padding:0}header{box-shadow:none}.actions,.copy,.toast{display:none}section,details,header{break-inside:avoid;box-shadow:none}}
</style>
</head>
<body>
<main>
<header>
  <h1>RAV-Recap</h1>
  <p><strong>{{job.title}}</strong></p>
  <p class="sub">{{company.name}} · Bewerbung vom {{applicationDate}}</p>
</header>
<div class="actions">
  <button class="btn primary" type="button" onclick="copyAll()">Alle Werte kopieren</button>
  <button class="btn secondary" type="button" onclick="window.print()">Drucken / als PDF sichern</button>
</div>
<section><h2>1 · Bewerbung</h2>{{fields.application}}</section>
<section><h2>2 · Arbeitgeber</h2>{{fields.company}}</section>
<section><h2>3 · Stelle und Status</h2>{{fields.job}}</section>
<details>
  <summary>Anweisungen und Annahmen</summary>
  {{instructionsAndSources}}
</details>
</main>
<div id="toast" class="toast" role="status">Kopiert</div>
<script>
const allText={{jsonAllText}};
function fallbackCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,ta.value.length);document.execCommand('copy');document.body.removeChild(ta)}
async function doCopy(text){try{if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(text);else fallbackCopy(text)}catch(e){fallbackCopy(text)}}
function showToast(text){const t=document.getElementById('toast');t.textContent=text;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
async function copyValue(btn){const value=btn.parentElement.querySelector('[data-value]').dataset.value;await doCopy(value);const old=btn.textContent;btn.textContent='Kopiert';btn.classList.add('done');setTimeout(()=>{btn.textContent=old;btn.classList.remove('done')},1300);showToast('Wert kopiert')}
async function copyAll(){await doCopy(allText);showToast('Alle Werte kopiert')}
</script>
</body>
</html>
