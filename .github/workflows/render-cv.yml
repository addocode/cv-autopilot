name: Render Application Documents

on:
  pull_request:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Install PDF and font tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            poppler-utils \
            fontconfig \
            fonts-liberation
          fc-cache -f -v
          fc-match Arial
          fc-match "Liberation Sans"
      - name: Apply verified profile updates
        run: node scripts/apply-profile-updates.mjs
      - run: npm run build
      - run: npm run validate
      - run: npm run test:data
      - run: npm run test:application
      - name: Run render all with captured exit code
        id: render_all
        shell: bash
        run: |
          mkdir -p dist
          set +e
          set -o pipefail
          npm run render:all \
            2>&1 | \
            tee dist/render-all-command.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "render:all exit code: ${code}"
          exit 0
      - name: Run render tests with captured exit code
        id: render_tests
        shell: bash
        run: |
          mkdir -p dist
          set +e
          set -o pipefail
          npm run test:render \
            2>&1 | \
            tee dist/render-tests-command.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "test:render exit code: ${code}"
          exit 0
      - name: Run fictive application E2E with captured exit code
        id: application_e2e
        shell: bash
        run: |
          mkdir -p dist applications exports
          set +e
          set -o pipefail
          npm run create:application -- \
            --job-ad tests/fixtures/fictive-job-ad.txt \
            --extracted-context tests/fixtures/extracted-context-fictive.json \
            --application-date 2026-07-20 \
            --timestamp 2026-07-20T20:00:00+00:00 \
            2>&1 | tee dist/application-e2e-command.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "application E2E exit code: ${code}"
          exit 0
      - name: Run Transgourmet live application with captured exit code
        id: application_live
        shell: bash
        run: |
          mkdir -p dist applications exports
          set +e
          set -o pipefail
          npm run create:application -- \
            --job-ad tests/fixtures/live-transgourmet-digital-marketing-job-ad.txt \
            --extracted-context tests/fixtures/live-transgourmet-digital-marketing-context.json \
            --source-url "https://jobs.transgourmet.ch/offene-stellen/junior-digital-marketing-managerin-manager/dbed0af8-0125-40c3-a1b7-7d059995797b" \
            --source-type url \
            --application-date 2026-07-21 \
            --timestamp 2026-07-21T12:00:00+03:00 \
            2>&1 | tee dist/application-live-command.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "application live exit code: ${code}"
          exit 0
      - name: Run BSM Records Manager live application with captured exit code
        id: application_bsm
        shell: bash
        run: |
          mkdir -p dist applications exports
          set +e
          set -o pipefail
          npm run create:application -- \
            --job-ad tests/fixtures/live-bsm-records-manager-job-ad.txt \
            --extracted-context tests/fixtures/live-bsm-records-manager-context.json \
            --source-url "https://www.jobs.apps.be.ch/offene-stellen/records-managerin-records-manager/984261a0-8d92-4d80-846c-39bf60a941af" \
            --source-type url \
            --application-date 2026-07-22 \
            --timestamp 2026-07-22T10:00:00+02:00 \
            2>&1 | tee dist/application-bsm-command.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "BSM application exit code: ${code}"
          exit 0
      - name: Render canonical Transgourmet motivation letter
        id: motivation_letter
        shell: bash
        run: |
          mkdir -p dist
          set +e
          set -o pipefail
          npm run render:motivation-letter -- \
            --input tests/fixtures/live-transgourmet-motivation-letter.json \
            2>&1 | tee dist/motivation-letter-command.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "motivation letter render exit code: ${code}"
          exit 0
      - name: Render BSM Records Manager motivation letter
        id: motivation_letter_bsm
        shell: bash
        run: |
          mkdir -p dist
          set +e
          set -o pipefail
          npm run render:motivation-letter -- \
            --input tests/fixtures/live-bsm-records-manager-motivation-letter.json \
            2>&1 | tee dist/motivation-letter-bsm-command.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "BSM motivation letter render exit code: ${code}"
          exit 0
      - name: Test motivation letter layout contract
        id: motivation_letter_tests
        shell: bash
        run: |
          mkdir -p dist
          set +e
          set -o pipefail
          npm run test:motivation-letter \
            2>&1 | tee dist/motivation-letter-tests-command.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "motivation letter tests exit code: ${code}"
          exit 0
      - name: Write command status
        if: always()
        env:
          RENDER_ALL_EXIT_CODE: ${{ steps.render_all.outputs.exit_code }}
          RENDER_TESTS_EXIT_CODE: ${{ steps.render_tests.outputs.exit_code }}
        run: node scripts/write-command-status.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-render-artifacts
          path: |
            dist/*.pdf
            dist/*.png
            dist/*-preview.html
            dist/render-report-*.json
            dist/motivation-letter-report-*.json
            dist/motivation-letter-text-*.txt
            dist/visual-review-round-*.json
            dist/text-*-poppler-raw.txt
            dist/text-*-poppler-default.txt
            dist/text-*-poppler-layout.txt
            dist/render-failure-*.json
            dist/render-log-*.txt
            dist/fonts-*-pdffonts.txt
            dist/font-resolution.txt
            dist/render-all-command.log
            dist/render-tests-command.log
            dist/command-status.json
            dist/render-all-exit-diagnostic.json
            dist/application-e2e-command.log
            dist/application-live-command.log
            dist/application-bsm-command.log
            dist/motivation-letter-command.log
            dist/motivation-letter-bsm-command.log
            dist/motivation-letter-tests-command.log
            applications/**
            exports/**
      - name: Fail if a production gate failed
        if: >-
          always() &&
          (
            steps.render_all.outputs.exit_code != '0' ||
            steps.render_tests.outputs.exit_code != '0' ||
            steps.application_e2e.outputs.exit_code != '0' ||
            steps.application_live.outputs.exit_code != '0' ||
            steps.application_bsm.outputs.exit_code != '0' ||
            steps.motivation_letter.outputs.exit_code != '0' ||
            steps.motivation_letter_bsm.outputs.exit_code != '0' ||
            steps.motivation_letter_tests.outputs.exit_code != '0'
          )
        shell: bash
        run: |
          echo "render:all exit code: ${{ steps.render_all.outputs.exit_code }}"
          echo "test:render exit code: ${{ steps.render_tests.outputs.exit_code }}"
          echo "application E2E exit code: ${{ steps.application_e2e.outputs.exit_code }}"
          echo "Transgourmet application exit code: ${{ steps.application_live.outputs.exit_code }}"
          echo "BSM application exit code: ${{ steps.application_bsm.outputs.exit_code }}"
          echo "Transgourmet motivation letter exit code: ${{ steps.motivation_letter.outputs.exit_code }}"
          echo "BSM motivation letter exit code: ${{ steps.motivation_letter_bsm.outputs.exit_code }}"
          echo "motivation letter tests exit code: ${{ steps.motivation_letter_tests.outputs.exit_code }}"
          echo "Last render-all output:"
          tail -n 100 dist/render-all-command.log || true
          echo "Last render-test output:"
          tail -n 200 dist/render-tests-command.log || true
          echo "Last application E2E output:"
          tail -n 200 dist/application-e2e-command.log || true
          echo "Last Transgourmet application output:"
          tail -n 200 dist/application-live-command.log || true
          echo "Last BSM application output:"
          tail -n 200 dist/application-bsm-command.log || true
          echo "Last Transgourmet motivation-letter output:"
          tail -n 200 dist/motivation-letter-command.log || true
          echo "Last BSM motivation-letter output:"
          tail -n 200 dist/motivation-letter-bsm-command.log || true
          echo "Last motivation-letter test output:"
          tail -n 200 dist/motivation-letter-tests-command.log || true
          exit 1
